services:
  postgres:
    image: postgres:16
    container_name: global-class-booking-postgres
    environment:
      POSTGRES_DB: global_class_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: global-class-booking-app
    depends_on:
      - postgres
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/global_class_booking
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data: